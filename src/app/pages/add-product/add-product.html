<div class="form-wrapper">
    <h2>Thêm Product</h2>

    <form [formGroup]="addForm" (ngSubmit)="submitForm()">
        <div class="form-group">
            <label>Tên sản phẩm</label>
            <input type="text" formControlName="name" />
            @if (name?.invalid && name?.touched) {
            <p class="error-msg">Tên sản phẩm là bắt buộc</p>
            }
        </div>

        <div class="form-group">
            <label>Giá</label>
            <input type="number" formControlName="price" />
            @if (price?.invalid && price?.touched) {
            <p class="error-msg">Giá phải lớn hơn 0</p>
            }
        </div>

        <div class="form-group">
            <label>Danh mục</label>
            <input type="text" formControlName="category" />
            @if (category?.invalid && category?.touched) {
            <p class="error-msg">Danh mục là bắt buộc</p>
            }
        </div>

        <button type="submit" [disabled]="addForm.invalid">Thêm sản
            phẩm</button>
    </form>

    @if (submitted) {
    <p class="success-msg">✅ Đã thêm sản phẩm thành công!</p>
    }
</div>
