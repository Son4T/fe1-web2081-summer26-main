<h2>Thêm Product</h2>

<form [formGroup]="addForm" (ngSubmit)="submitForm()">
    <div>
        <label>Tên sản phẩm</label>
        <input type="text" formControlName="name" />
        @if (name?.invalid && name?.touched) {
        <p style="color:red">Tên sản phẩm là bắt buộc</p>
        }
    </div>

    <div>
        <label>Giá</label>
        <input type="number" formControlName="price" />
        @if (price?.invalid && price?.touched) {
        <p style="color:red">Giá phải lớn hơn 0</p>
        }
    </div>

    <button type="submit" [disabled]="addForm.invalid || loading">
        {{ loading ? 'Đang gửi' : 'Thêm sản phẩm' }}
    </button>
</form>

@if (success) {
<p style="color: green">{{ success }}</p>
}
@if (error) {
<p style="color: red">{{ error }}</p>
}
